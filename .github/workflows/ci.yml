name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Verify Tasker integration assets
        run: |
          test -f integrations/tasker/tailclip_receiver_server.prf.xml
          test -f integrations/tasker/tailclip_sender.prf.xml

      - name: Verify Windows build
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-H windowsgui" -o /tmp/tailclip-agent.exe ./cmd/tailclip-agent

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, for example v1.0.0
        required: true
        type: string
      prerelease:
        description: Publish as a prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate requested version
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like v1.0.0 or v1.0.0-rc.1"
            exit 1
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist/package

          go run ./cmd/genwinres -manifest cmd/tailclip-agent/app.manifest -out cmd/tailclip-agent/rsrc_windows_amd64.syso -arch amd64
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w -H windowsgui" -o dist/package/tailclip-agent.exe ./cmd/tailclip-agent

          cp README.md dist/package/
          cp docs/config.example.json dist/package/
          cp docs/TASKER_SETUP.md dist/package/
          cp docs/TASKER_SHARE_TO_PC.md dist/package/
          cp integrations/tasker/tailclip_receiver_server.prf.xml dist/package/
          cp integrations/tasker/tailclip_sender.prf.xml dist/package/

          (
            cd dist/package
            zip -r ../tailclip-agent-windows-amd64.zip .
          )

          cp integrations/tasker/tailclip_receiver_server.prf.xml dist/
          cp integrations/tasker/tailclip_sender.prf.xml dist/

          (
            cd dist
            sha256sum tailclip-agent-windows-amd64.zip tailclip_receiver_server.prf.xml tailclip_sender.prf.xml > SHA256SUMS.txt
          )

      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep '^v' | head -n 1 || true)"

          if [ -n "$PREVIOUS_TAG" ]; then
            git log --pretty=format:'- %s (%h)' "$PREVIOUS_TAG..HEAD" > dist/commit-list.md
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$VERSION" \
              -f target_commitish="$GITHUB_SHA" \
              -f previous_tag_name="$PREVIOUS_TAG" \
              --jq .body > dist/generated-notes.md
          else
            git log --pretty=format:'- %s (%h)' HEAD > dist/commit-list.md
            gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="$VERSION" \
              -f target_commitish="$GITHUB_SHA" \
              --jq .body > dist/generated-notes.md
          fi

          cat > dist/release-notes.md <<EOF
          ## Quick Start

          1. Download \`tailclip-agent-windows-amd64.zip\` and the Tasker XML files from the release assets.
          2. Extract the zip, run \`tailclip-agent.exe\`, click the tray icon, and fill in your phone URL and token in the settings window.
          3. Import \`tailclip_receiver_server.prf.xml\` for automatic \`Windows -> Android\`.
          4. Import \`tailclip_sender.prf.xml\` for manual \`Android -> Windows\`.
          5. Set the Tasker globals documented in the guides, including \`%TAILCLIP_TOKEN\`.
          6. Follow the full Android guides at https://github.com/${GITHUB_REPOSITORY}/blob/$VERSION/docs/TASKER_SETUP.md and https://github.com/${GITHUB_REPOSITORY}/blob/$VERSION/docs/TASKER_SHARE_TO_PC.md

          ## Included Assets

          - \`tailclip-agent-windows-amd64.zip\`: Windows agent binary plus setup files.
          - \`tailclip_receiver_server.prf.xml\`: Tasker profile for automatic \`Windows -> Android\`.
          - \`tailclip_sender.prf.xml\`: Tasker profile for manual \`Android -> Windows\`.
          - \`SHA256SUMS.txt\`: checksums for the release assets.

          ## Commits In This Release

          EOF

          cat dist/commit-list.md >> dist/release-notes.md
          printf "\n\n" >> dist/release-notes.md
          cat dist/generated-notes.md >> dist/release-notes.md

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          args=(
            "$VERSION"
            "dist/tailclip-agent-windows-amd64.zip#Windows agent"
            "dist/tailclip_receiver_server.prf.xml#Tasker profile (Windows to Android)"
            "dist/tailclip_sender.prf.xml#Tasker profile (Android to Windows)"
            "dist/SHA256SUMS.txt#Checksums"
            "--title" "Tailclip $VERSION"
            "--target" "$GITHUB_SHA"
            "--notes-file" "dist/release-notes.md"
          )

          if [ "$PRERELEASE" = "true" ]; then
            args+=("--prerelease")
          fi

          gh release create "${args[@]}"
